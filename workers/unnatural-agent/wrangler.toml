name = "unnatural-agent"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[durable_objects]
bindings = [
  { name = "UNNATURAL_AGENT", class_name = "UnnaturalAgent" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["UnnaturalAgent"]

[[d1_databases]]
binding = "DB"
database_name = "unnatural-db"
database_id = "placeholder-replace-after-wrangler-d1-create"

[vars]
BETTER_AUTH_URL = "https://unnatural-agent.workers.dev"
