name = "unnatural-agent"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[durable_objects]
bindings = [
  { name = "UNNATURAL_AGENT", class_name = "UnnaturalAgent" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["UnnaturalAgent"]

[[d1_databases]]
binding = "DB"
database_name = "unnatural-db"
database_id = "placeholder-replace-after-wrangler-d1-create"

[send_email]
bindings = [
  { name = "EMAIL" }
]

# Rate limiting for the unauthenticated magic-link send endpoint.
# Fail-open in dev (binding missing = skip). Enforce once configured.
# Pick any unique integer for namespace_id.
[[unsafe.bindings]]
type = "ratelimit"
name = "MAGIC_LINK_LIMITER"
namespace_id = "1001"
simple = { limit = 5, period = 60 }

[vars]
BETTER_AUTH_URL = "https://unnatural-agent.workers.dev"
# Per-user daily cap on stored analyses (the expensive code path).
DAILY_ANALYSIS_CAP = "20"
